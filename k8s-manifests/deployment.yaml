---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-devops-python
  namespace: demo-devops
  labels:
    app: demo-devops-python
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-devops-python
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: demo-devops-python
        version: v1
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: migrate
          image: IMAGE_REPOSITORY:IMAGE_TAG
          imagePullPolicy: Always
          command: ["python", "manage.py", "migrate", "--noinput"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: demo-devops-python-secret
                  key: DJANGO_SECRET_KEY
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: demo-devops-python-config
                  key: DATABASE_NAME
          volumeMounts:
            - name: data
              mountPath: /app/data

      containers:
        - name: demo-devops-python
          image: IMAGE_REPOSITORY:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: demo-devops-python-secret
                  key: DJANGO_SECRET_KEY
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: demo-devops-python-config
                  key: DATABASE_NAME
            - name: ALLOWED_HOSTS
              valueFrom:
                configMapKeyRef:
                  name: demo-devops-python-config
                  key: ALLOWED_HOSTS
            - name: DJANGO_DEBUG
              valueFrom:
                configMapKeyRef:
                  name: demo-devops-python-config
                  key: DJANGO_DEBUG
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/users/
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/users/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/users/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: data
              mountPath: /app/data

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: demo-devops-python-data

      terminationGracePeriodSeconds: 30
